<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arcade Hub — A collection of browser-based mini games with a neon arcade aesthetic.">
    <title>Arcade Hub — Game Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particle canvas background -->
    <canvas id="particles-canvas"></canvas>

    <!-- ==================== HUB SCREEN ==================== -->
    <div id="hub-screen" class="screen active">
        <header class="hub-header">
            <h1 class="arcade-title">
                <span class="title-icon">🕹️</span>
                <span class="title-text">ARCADE<span class="title-accent">HUB</span></span>
            </h1>
            <p class="hub-subtitle">Select a game to play</p>
        </header>

        <div class="games-grid" id="games-grid">
            <!-- Game cards injected by hub.js -->
        </div>
    </div>

    <!-- ==================== GAME SCREEN ==================== -->
    <div id="game-screen" class="screen">
        <button id="back-btn" class="back-btn" aria-label="Back to hub">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span>Back</span>
        </button>
        <div id="game-container" class="game-container"></div>
    </div>

    <!-- Scripts -->
    <script src="hub.js"></script>
    <script src="games/flash-memory.js"></script>
    <script src="games/zombie-shooter.js"></script>
    <script>
        // Register games here as they are added
        Hub.registerGame({
            id: 'flash-memory',
            title: 'Flash Memory',
            emoji: '🧠',
            description: 'A number flashes briefly — remember it and type it back!',
            color: '#a855f7',
            init: FlashMemory.init,
            destroy: FlashMemory.destroy
        });

        Hub.registerGame({
            id: 'zombie-shooter',
            title: 'Zombie Arsenal',
            emoji: '🧟',
            description: 'Unlock weapons on the left, fight zombies on the right. Multipliers increase your power!',
            color: '#22d3ee',
            init: ZombieShooter.init,
            destroy: ZombieShooter.destroy
        });

        Hub.boot();
    </script>
</body>
</html>
